<a [routerLink]="['/movie', movie().id]" class="card" [attr.id]="'movie-card-' + movie().id">
  <div class="card__poster-wrapper">
    <img
      [src]="posterUrl"
      [alt]="movie().title"
      class="card__poster"
      loading="lazy"
    />
    <div class="card__overlay">
      <span class="card__view-btn">Ver detalles</span>
    </div>
    <div class="card__rating" [style.background]="ratingColor">
      <span>★</span> {{ rating }}
    </div>
  </div>
  <div class="card__info">
    <h3 class="card__title">{{ movie().title }}</h3>
    <span class="card__year">{{ year }}</span>
  </div>
</a>
