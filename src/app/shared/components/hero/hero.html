<div class="hero-container" [style.background-image]="'url(' + fullImageUrl + ')'">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <span class="hero-tag">PELÍCULA DESTACADA</span>
    <h1>{{ movie.title }}</h1>
    <p>{{ movie.overview }}</p>
    <div class="hero-actions">
      <button class="btn-play">Reproducir</button>
      <button class="btn-info">Más información</button>
    </div>
  </div>
</div>
