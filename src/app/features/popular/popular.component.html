<section class="catalog" id="popular-page">
  <div class="catalog__header">
    <h1 class="catalog__title">🌟 Películas Populares</h1>
    <p class="catalog__subtitle">Las películas más vistas del momento</p>
  </div>

  <div class="movie-grid" id="popular-movies-grid">
    @for (movie of movies(); track movie.id) {
      <app-movie-card [movie]="movie" />
    }
  </div>

  @if (currentPage() < totalPages()) {
    <div class="catalog__load-more">
      <button class="catalog__load-btn" (click)="loadMore()" [disabled]="isLoading()" id="load-more-btn">
        @if (isLoading()) {
          <span class="catalog__spinner"></span> Cargando...
        } @else {
          Cargar más películas
        }
      </button>
    </div>
  }
</section>
